# Static analysis for security vulnerabilities (free for public repositories).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "25 11 * * 3"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # autobuild: traced compiler build improves call-target and type resolution vs none.
          - language: csharp
            build-mode: autobuild
          - language: javascript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild (C#)
        if: matrix.language == 'csharp'
        uses: github/codeql-action/autobuild@v3

      - name: Install frontend dependencies (JavaScript)
        if: matrix.language == 'javascript'
        working-directory: roast66
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
