# Periodic HTTP GET from GitHub's network to reduce Render free-tier cold starts.
# Configure repository secrets (Settings → Secrets and variables → Actions):
#   API_HEALTH_CHECK_URL — API liveness, e.g. https://your-api.onrender.com/api/health
#   HEALTH_CHECK_URL — frontend static site, e.g. https://your-app.onrender.com/
#   SUPABASE_WAKE_URL — optional; e.g. Supabase REST base if your plan pauses on idle
#
# Scheduled workflows use the version of this file on the default branch (usually main).
#
# If this workflow never runs on schedule, check:
#   • Actions tab → "Scheduled health ping" is enabled (not disabled). Public repos: GitHub
#     auto-disables scheduled workflows after ~60 days with no repo activity; re-enable there
#     or push a commit that changes the cron below (that also reactivates the schedule).
#   • Fork: enable Actions on the fork (Settings → Actions → allow workflows).
#   • Billing: private repos need Actions minutes; exhausted minutes can block runs.
#   • Schedules are best-effort UTC; GitHub may delay or drop jobs when load is high, especially
#     at :00 and :30 — this file uses minute offsets to reduce that.

name: Scheduled health ping

on:
  schedule:
    # Twelve times per hour (~every 5 min), minutes 2/7/12/…/57 — avoids firing exactly on :00/:30.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

# No checkout or GitHub API use; curl-only steps use repository secrets.
permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health
        env:
          url: ${{ secrets.API_HEALTH_CHECK_URL }}
        run: |
          if [ -z "$url" ]; then
            echo "API_HEALTH_CHECK_URL secret not set; skipping API ping."
            exit 0
          fi
          curl -fsS --max-time 90 "$url"

      - name: Ping frontend (static site)
        env:
          url: ${{ secrets.HEALTH_CHECK_URL }}
        run: |
          if [ -z "$url" ]; then
            echo "HEALTH_CHECK_URL secret not set; skipping frontend ping."
            exit 0
          fi
          curl -fsS --max-time 90 "$url"

      - name: Ping Supabase (optional)
        env:
          url: ${{ secrets.SUPABASE_WAKE_URL }}
        run: |
          if [ -z "$url" ]; then
            echo "SUPABASE_WAKE_URL not set; skipping."
            exit 0
          fi
          curl -fsS --max-time 90 "$url"
