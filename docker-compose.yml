services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
    env_file:
      - CoffeeShopApi/.env
    depends_on:
      postgres-db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    env_file:
      - roast66/.env
    depends_on:
      - backend

  postgres-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: coffeedb
      POSTGRES_USER: root
      POSTGRES_PASSWORD: toor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d coffeedb"]
      interval: 10s
      retries: 5

volumes:
  postgres-data:
